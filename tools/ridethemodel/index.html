<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RideTheModel | model test suite</title>
<meta name="description" content="Enter tasks. Get personal model scorecard.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
.result-section { margin-bottom: var(--space-md); animation: fadeSlideIn 0.4s ease both; }
.result-section h4 { font-size: 0.7rem; font-family: "Space Grotesk", sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: var(--neon-amber); margin-bottom: 0.5rem; opacity: 0.8; }
.result-section ul { list-style: none; padding: 0; }
.result-section li { padding: 0.3rem 0; font-size: 0.82rem; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.highlight-block { background: var(--ceramic-cool); border-left: 2px solid var(--neon-amber); padding: var(--space-xs) var(--space-sm); margin: var(--space-xs) 0; font-size: 0.8rem; color: var(--text-dim); line-height: 1.7; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xs); margin: var(--space-sm) 0; }
.metric-box { background: var(--ceramic-cool); padding: var(--space-sm); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; }
.metric-box strong { display: block; font-size: 1.5rem; font-weight: 700; font-family: "Space Grotesk", sans-serif; color: var(--neon-cyan); }
.metric-box span { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.2rem; display: block; }
.choice-btn { padding: 0.4rem 0.8rem; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim); cursor: pointer; transition: all 0.2s; font-size: 0.8rem; font-family: "Inter", sans-serif; }
.choice-btn:hover { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.04); }
.choice-btn.active { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.08); }
.chip { display: inline-block; padding: 0.1rem 0.35rem; margin: 0.1rem; background: var(--ceramic-cool); border: 1px solid var(--border); border-radius: 4px; font-size: 0.72rem; color: var(--text-dim); font-family: "JetBrains Mono", monospace; }
.bar-container { background: var(--ceramic-cool); border-radius: 4px; height: 8px; overflow: hidden; margin: 0.25rem 0; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--neon-cyan), rgba(0,229,255,0.4)); transition: width 0.6s ease; }
@media (max-width: 768px) { .tool-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="site-title">
      <span class="title-icon">&#9670;</span>
      mini tools
    </div>
    <nav class="site-nav">
      <a href="../../">apps</a>
      <a href="https://github.com/santaclawone/mini-tools" target="_blank">source</a>
    </nav>
  </div>
</header>

<main class="container tool-page">
  <div class="tool-page-inner">
    <a href="../../" class="tool-back">&larr; back to tools</a>

    <div class="tool-header">
      <div class="tool-header-icon" style="background:linear-gradient(135deg,#7C3AED,#F59E0B);color:#fff;">&#9790;</div>
      <div class="tool-header-text">
        <h1>RideTheModel</h1>
        <div class="tool-meta">
          <span><span class="meta-dot"></span> batch 2</span>
          <span>interactive</span>
          <span>every.to / Lenny</span>
        </div>
      </div>
    </div>

    <div class="tool-body">
      <div class="tool-panel">
        <h3>your tasks</h3>
        <textarea id="rtm-input" placeholder="Enter a task you care about..." rows="2" style="min-height:50px"></textarea>
        <div class="tool-actions">
          <button class="btn btn-primary" onclick="addTask()">add task</button>
          <button class="sample-btn" onclick="loadRTMSample()">sample tasks</button>
        </div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:0.5rem">Add 3-5 tasks and score each model on a 1-5 scale.</div>
      </div>

      <div class="tool-panel">
        <h3>model scorecard</h3>
        <div id="rtm-output"><div class="tool-output-empty">Add tasks and score each model.</div></div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer"><div class="container">RideTheModel — build a personal model benchmark</div></footer>

<script>
var taskStore = [];
function addTask() {
  var t = document.getElementById("rtm-input").value.trim(); if (!t) return;
  taskStore.push({task: t, scores: {}});
  document.getElementById("rtm-input").value = ""; renderScorecard();
}
function scoreTask(idx, model, score) {
  taskStore[idx].scores[model] = parseInt(score);
  renderScorecard();
}
function renderScorecard() {
  var models = ["GPT-5","Claude 4","Gemini 2","DeepSeek-V4"];
  if (taskStore.length === 0) { document.getElementById("rtm-output").innerHTML = '<div class="tool-output-empty">Add tasks and score each model to build your scorecard.</div>'; return; }
  var h = '<div class="result-section"><h4>personal model scorecard</h4><div class="metric-grid"><div class="metric-box"><strong>'+taskStore.length+'</strong><span>tasks</span></div><div class="metric-box"><strong>'+models.length+'</strong><span>models tracked</span></div></div></div>';
  taskStore.forEach(function(tsk, i) {
    h += '<div class="result-section"><h4>task '+(i+1)+': '+tsk.task.substring(0,50)+'</h4><div style="display:flex;flex-wrap:wrap;gap:0.5rem">';
    models.forEach(function(m) {
      var val = tsk.scores[m] || 0;
      h += '<div style="min-width:100px"><div style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.2rem">'+m+'</div><select class="choice-btn" style="padding:0.15rem 0.3rem;font-size:0.7rem;font-family:\'JetBrains Mono\',monospace;cursor:pointer" onchange="scoreTask('+i+',\''+m+'\',this.value)"><option value="0" '+(val===0?'selected':'')+'>\u2014</option><option value="1" '+(val===1?'selected':'')+'>1</option><option value="2" '+(val===2?'selected':'')+'>2</option><option value="3" '+(val===3?'selected':'')+'>3</option><option value="4" '+(val===4?'selected':'')+'>4</option><option value="5" '+(val===5?'selected':'')+'>5</option></select></div>';
    });
    h += '</div></div>';
  });
  var totals = {}; var counts = {};
  models.forEach(function(m){totals[m]=0;counts[m]=0});
  taskStore.forEach(function(tsk){models.forEach(function(m){if(tsk.scores[m]){totals[m]+=tsk.scores[m];counts[m]++}})});
  h += '<div class="result-section"><h4>model averages</h4><ul>';
  var sorted = models.sort(function(a,b){var av=a,avb=b;return (totals[b]/Math.max(counts[b],1))-(totals[a]/Math.max(counts[a],1))});
  sorted.forEach(function(m){var avg = counts[m]>0 ? (totals[m]/counts[m]).toFixed(1) : "\u2014"; h += '<li><span>'+m+'</span><span>'+avg+'/5 across '+(counts[m])+' tasks</span></li>';});
  h += '</ul></div>';
  var best = sorted[0]; var bestAvg = counts[best]>0 ? (totals[best]/counts[best]).toFixed(1) : 0;
  h += '<div class="result-section"><h4>one takeaway</h4><div class="highlight-block">Best performer: '+best+' ('+bestAvg+'/5). Keep running your personal benchmark every model release.</div></div>';
  document.getElementById("rtm-output").innerHTML = h;
}
function loadRTMSample() {
  taskStore = [{task:"Generate a REST API from a natural language description",scores:{}},{task:"Refactor a React component to reduce re-renders",scores:{}},{task:"Write a complex SQL query with window functions",scores:{}}];
  renderScorecard();
}
</script>
</body>
</html>
