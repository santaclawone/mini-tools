<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manuscript | meeting pattern analyzer</title>
<meta name="description" content="Drop your meeting transcripts. Build a voice profile and surface blind spots.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
  #manuscript-result { white-space: pre-wrap; }
  .result-section { margin-bottom: var(--space-md); animation: fadeSlideIn 0.4s ease both; }
  .result-section:nth-child(2) { animation-delay: 0.05s; }
  .result-section:nth-child(3) { animation-delay: 0.1s; }
  .result-section:nth-child(4) { animation-delay: 0.15s; }
  .result-section h4 { font-size: 0.7rem; font-family: "Space Grotesk", sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: var(--neon-amber); margin-bottom: 0.5rem; opacity: 0.8; }
  .result-section ul { list-style: none; padding: 0; }
  .result-section li { padding: 0.3rem 0; font-size: 0.82rem; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: var(--space-sm); }
  .result-section li span:first-child { color: var(--text); }
  .result-section li span:last-child { color: var(--text-muted); font-family: "JetBrains Mono", monospace; font-size: 0.75rem; flex-shrink: 0; }
  .pattern-block { background: var(--ceramic-cool); border-left: 2px solid var(--neon-amber); padding: var(--space-xs) var(--space-sm); margin: var(--space-xs) 0; font-size: 0.8rem; color: var(--text-dim); line-height: 1.7; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xs); margin: var(--space-sm) 0; }
  .metric-box { background: var(--ceramic-cool); padding: var(--space-sm); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; }
  .metric-box strong { display: block; font-size: 1.5rem; font-weight: 700; font-family: "Space Grotesk", sans-serif; color: var(--neon-cyan); }
  .metric-box span { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.2rem; display: block; }
  #para-count { font-size: 0.72rem; color: var(--text-muted); font-family: "JetBrains Mono", monospace; }
  @media (max-width: 768px) { .tool-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="site-title">
      <span class="title-icon">&#9670;</span>
      mini tools
    </div>
    <nav class="site-nav">
      <a href="../../">apps</a>
      <a href="https://github.com/santaclawone/mini-tools" target="_blank">source</a>
    </nav>
  </div>
</header>

<main class="container tool-page">
  <div class="tool-page-inner">
    <a href="../../" class="tool-back">&larr; back to tools</a>

    <div class="tool-header">
      <div class="tool-header-icon" style="background:linear-gradient(135deg,#7C3AED,#FF2D78);color:#fff;">&#9782;</div>
      <div class="tool-header-text">
        <h1>Manuscript</h1>
        <div class="tool-meta">
          <span><span class="meta-dot"></span> batch 1</span>
          <span>working prototype</span>
          <span>Dan Shipper / Every</span>
        </div>
      </div>
    </div>

    <div class="tool-body">
      <div class="tool-panel">
        <h3>transcript</h3>
        <textarea id="input-transcript" placeholder="Paste a meeting transcript with speaker labels.&#10;&#10;Format: SpeakerName: text" rows="12"></textarea>
        <div class="tool-actions">
          <button class="btn btn-primary" onclick="analyzeTranscript()">analyze transcript</button>
          <button class="sample-btn" onclick="loadSample()">load sample</button>
          <span id="para-count"></span>
        </div>
      </div>

      <div class="tool-panel">
        <h3>patterns</h3>
        <div id="manuscript-result"><div class="tool-output-empty">Paste a transcript and click "analyze transcript" to surface your patterns.</div></div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer"><div class="container">Manuscript — extracted from Dan Shipper on Lenny's Podcast</div></footer>

<script>
document.getElementById('input-transcript').addEventListener('input',function(){document.getElementById('para-count').textContent=this.value.trim().split('\n').filter(l=>l.trim()).length+' lines'});

function loadSample(){const s="Alex: I've been working on the new onboarding flow. I think we should add a video tutorial.\nYou: Interesting. What kind of video?\nAlex: Maybe a 90-second walkthrough. Show the key features.\nYou: That could work. Though I worry about maintenance. Videos get stale.\nAlex: We could split-test it. See if it improves activation.\nYou: Let me think about that. I mean, it's a good idea. Testing is always smart. But I'm not sure we have the bandwidth right now.\nAlex: What if I owned it? I could keep it updated as part of my regular cycle.\nYou: Hmm. That's a decent offer. Let me consider the trade-offs. The team is already stretched thin.";document.getElementById('input-transcript').value=s;document.getElementById('para-count').textContent=s.trim().split('\n').filter(l=>l.trim()).length+' lines'}

function analyzeTranscript(){const t=document.getElementById('input-transcript').value.trim();if(!t||t.split('\n').filter(l=>l.trim()).length<3){document.getElementById('manuscript-result').innerHTML='<div class="tool-output-empty">Need at least 3 lines of transcript.</div>';return}
const e=[];for(const l of t.split('\n').filter(l=>l.trim())){const m=l.match(/^([A-Za-z0-9][A-Za-z0-9\s]*?):\s(.+)$/);if(m)e.push({speaker:m[1].trim(),text:m[2].trim()})}
if(e.length===0)e.push({speaker:'Speaker',text:t});const ss={};e.forEach(e=>{if(!ss[e.speaker])ss[e.speaker]={turns:0,words:0,questions:0,hedges:0,affirmatives:0,negatives:0};const s=ss[e.speaker];s.turns++;s.words+=e.text.split(/\s+/).length;s.questions+=(e.text.match(/\?/g)||[]).length;s.hedges+=(e.text.match(/\b(maybe|perhaps|possibly|I think|I feel|not sure|kind of|sort of|I guess)\b/gi)||[]).length;s.affirmatives+=(e.text.match(/\b(yes|sure|okay|great|good|alright|agreed|absolutely)\b/gi)||[]).length;s.negatives+=(e.text.match(/\b(no|but|however|though|worried|concerned|problem|issue|hard|difficult)\b/gi)||[]).length})
const sorted=Object.entries(ss).sort((a,b)=>b[1].turns-a[1].turns),main=sorted[0],ms=main[1];let h=''
h+=`<div class="metric-grid"><div class="metric-box"><strong>${e.length}</strong><span>total turns</span></div><div class="metric-box"><strong>${Object.keys(ss).length}</strong><span>speakers</span></div><div class="metric-box"><strong>${Math.round(ms.words/Math.max(ms.turns,1))}</strong><span>avg words per turn</span></div></div>`
h+=`<div class="result-section"><h4>profile: ${main[0]}</h4><ul><li><span>turns taken</span><span>${ms.turns}</span></li><li><span>questions asked</span><span>${ms.questions}</span></li><li><span>hedging language</span><span>${ms.hedges} (${(ms.hedges/Math.max(ms.turns,1)*100).toFixed(0)}% of turns)</span></li><li><span>affirmatives</span><span>${ms.affirmatives}</span></li><li><span>negatives / buts</span><span>${ms.negatives}</span></li></ul></div>`
const hr=ms.hedges/Math.max(ms.turns,1)*100;h+=`<div class="result-section"><h4>decisiveness index</h4>${hr>50?`<div class="pattern-block">High hedging (${hr.toFixed(0)}%). You lead with "maybe" and "I think." Consider replacing "I think we should" with "Let's."</div>`:hr>20?`<div class="pattern-block">Moderate hedging (${hr.toFixed(0)}%). Balanced openness and conviction.</div>`:`<div class="pattern-block">Low hedging (${hr.toFixed(0)}%). You speak with direct conviction.</div>`}</div>`
const qr=ms.questions/Math.max(ms.turns,1)*100;h+=`<div class="result-section"><h4>question vs statement</h4>${qr>40?`<div class="pattern-block">High question rate (${qr.toFixed(0)}%). You explore more than you assert.</div>`:qr>15?`<div class="pattern-block">Balanced question rate (${qr.toFixed(0)}%). Good mix of inquiry and assertion.</div>`:`<div class="pattern-block">Low question rate (${qr.toFixed(0)}%). Consider asking more open questions.</div>`}</div>`
if(sorted.length>1){h+=`<div class="result-section"><h4>speaker comparison</h4><ul>`;for(const[n,s]of sorted){h+=`<li><span>${n}</span><span>${s.turns} turns, ${s.words} words, ${s.questions} questions</span></li>`}h+=`</ul></div>`}
h+=`<div class="result-section"><h4>next meeting: one shift</h4><ul><li><span>${ms.hedges>3?'Replace "I think" with "Let\'s"':'Ask one more open question'}</span><span>try it</span></li><li><span>${ms.affirmatives>ms.negatives*2?'Follow "yes" with a risk':'Start with "yes, and"'}</span><span>rebalance</span></li></ul></div>`
document.getElementById('manuscript-result').innerHTML=h}
</script>
</body>
</html>
