<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StylePull | author style extractor</title>
<meta name="description" content="Feed it any text. Extract the author's signature techniques into a usable playbook.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
  #stylepull-result { white-space: pre-wrap; }
  .result-section { margin-bottom: var(--space-md); animation: fadeSlideIn 0.4s ease both; }
  .result-section:nth-child(2) { animation-delay: 0.05s; }
  .result-section:nth-child(3) { animation-delay: 0.1s; }
  .result-section:nth-child(4) { animation-delay: 0.15s; }
  .result-section:nth-child(5) { animation-delay: 0.2s; }
  .result-section h4 { font-size: 0.7rem; font-family: "Space Grotesk", sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: var(--neon-amber); margin-bottom: 0.5rem; opacity: 0.8; }
  .result-section ul { list-style: none; padding: 0; }
  .result-section li { padding: 0.3rem 0; font-size: 0.82rem; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: var(--space-sm); }
  .result-section li span:first-child { color: var(--text); }
  .result-section li span:last-child { color: var(--text-muted); font-family: "JetBrains Mono", monospace; font-size: 0.75rem; flex-shrink: 0; }
  .highlight-block { background: var(--ceramic-cool); border-left: 2px solid var(--neon-amber); padding: var(--space-xs) var(--space-sm); margin: var(--space-xs) 0; font-size: 0.8rem; color: var(--text-dim); line-height: 1.7; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .word-chip { display: inline-block; padding: 0.1rem 0.35rem; margin: 0.1rem; background: var(--ceramic-cool); border: 1px solid var(--border); border-radius: 4px; font-size: 0.75rem; color: var(--text-dim); font-family: "JetBrains Mono", monospace; }
  #word-count { font-size: 0.72rem; color: var(--text-muted); font-family: "JetBrains Mono", monospace; }
  @media (max-width: 768px) { .tool-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="site-title">
      <span class="title-icon">&#9670;</span>
      mini tools
    </div>
    <nav class="site-nav">
      <a href="../../">apps</a>
      <a href="https://github.com/santaclawone/mini-tools" target="_blank">source</a>
    </nav>
  </div>
</header>

<main class="container tool-page">
  <div class="tool-page-inner">
    <a href="../../" class="tool-back">&larr; back to tools</a>

    <div class="tool-header">
      <div class="tool-header-icon" style="background:linear-gradient(135deg,#00E5FF,#FF2D78);color:#fff;">&#9998;</div>
      <div class="tool-header-text">
        <h1>StylePull</h1>
        <div class="tool-meta">
          <span><span class="meta-dot"></span> batch 1</span>
          <span>working prototype</span>
          <span>Dan Shipper / Every</span>
        </div>
      </div>
    </div>

    <div class="tool-body">
      <div class="tool-panel">
        <h3>input text</h3>
        <textarea id="input-text" placeholder="Paste a passage from any author. Aim for 200+ words.&#10;&#10;Example: paste a paragraph from a novel, a newsletter issue, or a blog post you admire." rows="12"></textarea>
        <div class="tool-actions">
          <button class="btn btn-primary" onclick="analyzeStyle()">analyze style</button>
          <button class="sample-btn" onclick="loadSample()">load sample</button>
          <span id="word-count"></span>
        </div>
      </div>

      <div class="tool-panel">
        <h3>style playbook</h3>
        <div id="stylepull-result">
          <div class="tool-output-empty">Paste text and click "analyze style" to generate a playbook.</div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">StylePull — extracted from Dan Shipper on Lenny's Podcast</div>
</footer>

<script>
function countWords(t){return t.trim()?t.trim().split(/\s+/).length:0}
document.getElementById('input-text').addEventListener('input',function(){document.getElementById('word-count').textContent=countWords(this.value)+' words'});

function loadSample(){const s="She was one of those pretty and charming girls born, as though fate had blundered over her, into a family of artisans. She had no marriage portion, no expectations, no means of being known, understood, loved, or wedded by a man of wealth and distinction; and she let herself be married off to a little clerk in the Ministry of Education. Her tastes were simple because she had never been able to afford any other, but she was as unhappy as though she had married beneath her; for women have no caste or class, their beauty, grace, and charm serving them for birth or family, their natural delicacy, their instinctive elegance, their nimbleness of wit, are their only mark of ranking, and the girls in that class may be the equal of the great ladies by means of a fine mouth and a well-turned ankle.\n\nShe suffered endlessly, feeling herself born for every delicacy and every luxury. She suffered from the poorness of her house, from its mean walls, worn chairs, and ugly curtains. All these things, of which other women of her class would not even have been aware, tormented and insulted her. The sight of the little Breton girl who did her humble housework stirred in her disconsolate regrets and wild daydreams.";document.getElementById('input-text').value=s;document.getElementById('word-count').textContent=countWords(s)+' words'}

function analyzeStyle(){const t=document.getElementById('input-text').value.trim();if(!t||countWords(t)<20){document.getElementById('stylepull-result').innerHTML='<div class=\"tool-output-empty\">Need at least 20 words to extract meaningful patterns.</div>';return}
const r=extractStyleGuide(t);document.getElementById('stylepull-result').innerHTML=renderResult(r)}

function extractStyleGuide(text){const s=text.match(/[^.!?\n]+[.!?]+/g)||[text],w=text.match(/\b\w+\b/g)||[],sl=s.map(x=>x.trim().split(/\s+/).length),avg=(sl.reduce((a,b)=>a+b,0)/sl.length).toFixed(1),short=sl.filter(l=>l<=8).length,long=sl.filter(l=>l>=25).length,uw=new Set(w.map(x=>x.toLowerCase().replace(/[^a-z]/g,''))),awl=(w.reduce((s,x)=>s+x.length,0)/w.length).toFixed(1),commas=(text.match(/,/g)||[]).length,semicolons=(text.match(/;/g)||[]).length,colons=(text.match(/:/g)||[]).length,leadIns=text.match(/\b(She|He|It|They|There|This|That)\s+(was|were|had|came|felt|knew|saw|thought|wanted|imagined)\b/gi)||[],andChains=text.match(/\w+(,\s+\w+)*,\s+and\s+\w+/g)||[]
return{text,stats:{sentenceCount:s.length,avgSentenceLen:avg,shortSents:short,longSents:long,vocabSize:uw.size,avgWordLen:awl,totalWords:w.length},punctuation:{commas,semicolons,colons,commasPerSent:(commas/s.length).toFixed(1)},rhythm:{leadIns:leadIns.length,andChains:andChains.length}}}

function renderResult(r){let h=''
h+=`<div class="result-section"><h4>overview</h4><ul><li><span>sentence count</span><span>${r.stats.sentenceCount}</span></li><li><span>average sentence length</span><span>${r.stats.avgSentenceLen} words</span></li><li><span>short sentences (<8 words)</span><span>${r.stats.shortSents} (${Math.round(r.stats.shortSents/r.stats.sentenceCount*100)}%)</span></li><li><span>long sentences (>25 words)</span><span>${r.stats.longSents} (${Math.round(r.stats.longSents/r.stats.sentenceCount*100)}%)</span></li><li><span>vocabulary size</span><span>${r.stats.vocabSize} unique words</span></li><li><span>average word length</span><span>${r.stats.avgWordLen} characters</span></li></ul></div>`
h+=`<div class="result-section"><h4>punctuation signature</h4><ul><li><span>commas</span><span>${r.punctuation.commas} (${r.punctuation.commasPerSent} per sentence)</span></li><li><span>semicolons</span><span>${r.punctuation.semicolons}</span></li><li><span>colons</span><span>${r.punctuation.colons}</span></li></ul></div>`
h+=`<div class="result-section"><h4>sentence rhythm</h4><ul><li><span>"and" chains (lists)</span><span>${r.rhythm.andChains}</span></li><li><span>pronoun-verb openings</span><span>${r.rhythm.leadIns}</span></li></ul></div>`
let tips=[]
if(r.stats.avgSentenceLen>20)tips.push('Long, flowing sentences dominate. The writer builds momentum through accumulation — clauses stacked on clauses.')
if(r.punctuation.commasPerSent>2)tips.push('Heavy comma use. The writer favors enumeration as a structural device, carrying the reader forward.')
if(r.rhythm.leadIns>3)tips.push('Frequent pronoun-verb openings. The writer anchors each sentence in a character\'s experience.')
h+=`<div class="result-section"><h4>signature techniques</h4>${tips.map(t=>`<div class="highlight-block">${t}</div>`).join('')||'<div class="highlight-block">No dominant patterns detected. Try a longer sample.</div>'}</div>`
h+=`<div class="result-section"><h4>actionable playbook</h4><ul><li><span>Use accumulation lists</span><span>stack 3+ descriptive elements per sentence</span></li><li><span>Anchor in perception</span><span>start with the subject's experience, not facts</span></li><li><span>Let sentences stretch</span><span>don't break long ideas into short ones</span></li><li><span>Count your commas</span><span>they reveal your rhythm signature</span></li></ul></div>`
return h}
</script>
</body>
</html>
