<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NeverRepeat | manager feedback coder</title>
<meta name="description" content="Manager feedback coder. Every piece of feedback becomes a reusable prompt.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
.result-section { margin-bottom: var(--space-md); animation: fadeSlideIn 0.4s ease both; }
.result-section h4 { font-size: 0.7rem; font-family: "Space Grotesk", sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: var(--neon-amber); margin-bottom: 0.5rem; opacity: 0.8; }
.result-section ul { list-style: none; padding: 0; }
.result-section li { padding: 0.3rem 0; font-size: 0.82rem; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.highlight-block { background: var(--ceramic-cool); border-left: 2px solid var(--neon-amber); padding: var(--space-xs) var(--space-sm); margin: var(--space-xs) 0; font-size: 0.8rem; color: var(--text-dim); line-height: 1.7; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xs); margin: var(--space-sm) 0; }
.metric-box { background: var(--ceramic-cool); padding: var(--space-sm); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; }
.metric-box strong { display: block; font-size: 1.5rem; font-weight: 700; font-family: "Space Grotesk", sans-serif; color: var(--neon-cyan); }
.metric-box span { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.2rem; display: block; }
.choice-btn { padding: 0.4rem 0.8rem; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim); cursor: pointer; transition: all 0.2s; font-size: 0.8rem; font-family: "Inter", sans-serif; }
.choice-btn:hover { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.04); }
.choice-btn.active { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.08); }
.chip { display: inline-block; padding: 0.1rem 0.35rem; margin: 0.1rem; background: var(--ceramic-cool); border: 1px solid var(--border); border-radius: 4px; font-size: 0.72rem; color: var(--text-dim); font-family: "JetBrains Mono", monospace; }
.bar-container { background: var(--ceramic-cool); border-radius: 4px; height: 8px; overflow: hidden; margin: 0.25rem 0; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--neon-cyan), rgba(0,229,255,0.4)); transition: width 0.6s ease; }
@media (max-width: 768px) { .tool-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="site-title">
      <span class="title-icon">&#9670;</span>
      mini tools
    </div>
    <nav class="site-nav">
      <a href="../../">apps</a>
      <a href="https://github.com/santaclawone/mini-tools" target="_blank">source</a>
    </nav>
  </div>
</header>

<main class="container tool-page">
  <div class="tool-page-inner">
    <a href="../../" class="tool-back">&larr; back to tools</a>

    <div class="tool-header">
      <div class="tool-header-icon" style="background:linear-gradient(135deg,#00E5FF,#F59E0B);color:#fff;">&#8634;</div>
      <div class="tool-header-text">
        <h1>NeverRepeat</h1>
        <div class="tool-meta">
          <span><span class="meta-dot"></span> batch 1</span>
          <span>interactive</span>
          <span>every.to / Lenny</span>
        </div>
      </div>
    </div>

    <div class="tool-body">
      <div class="tool-panel">
        <h3>feedback text</h3>
        <textarea id="nr-input" placeholder="Paste a piece of feedback you gave someone.&#10;&#10;The tool categorizes it and adds to your reusable prompt library." rows="8"></textarea>
        <div class="tool-actions">
          <button class="btn btn-primary" onclick="addFeedback()">add to library</button>
          <button class="sample-btn" onclick="loadSampleFeedback()">sample</button>
          <span id="input-stats" style="font-size:0.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace"></span>
        </div>
      </div>

      <div class="tool-panel">
        <h3>prompt library</h3>
        <div id="nr-output"><div class="tool-output-empty">Add feedback to build your reusable prompt library.</div></div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer"><div class="container">NeverRepeat — every piece of feedback becomes a reusable prompt</div></footer>

<script>
var feedbackStore = [];
function addFeedback() {
  var f = document.getElementById("nr-input").value.trim(); if (!f) return;
  var category = categorizeFeedback(f);
  feedbackStore.push({text: f, category: category});
  renderPrompts();
  document.getElementById("nr-input").value = "";
}
function categorizeFeedback(t) {
  var l = t.toLowerCase();
  if (l.match(/style|tone|voice|wording|copy|readab/)) return "writing style";
  if (l.match(/logic|reason|think|argu|fallac|assum/)) return "reasoning";
  if (l.match(/code|bug|error|function|api|syntax|performance/)) return "technical";
  if (l.match(/design|ui|layout|color|typography|spacing/)) return "design";
  if (l.match(/process|workflow|step|order|sequence/)) return "process";
  return "general";
}
function renderPrompts() {
  var cats = {};
  feedbackStore.forEach(function(f) {
    if (!cats[f.category]) cats[f.category] = {count: 0, examples: []};
    cats[f.category].count++;
    if (cats[f.category].examples.length < 2) cats[f.category].examples.push(f.text);
  });
  var h = '<div class="result-section"><h4>feedback library</h4>';
  if (feedbackStore.length === 0) {h += '<div class="tool-output-empty">No feedback recorded yet.</div>';}
  else {
    h += '<div class="metric-grid"><div class="metric-box"><strong>'+feedbackStore.length+'</strong><span>total items</span></div><div class="metric-box"><strong>'+Object.keys(cats).length+'</strong><span>categories</span></div><div class="metric-box"><strong>'+(feedbackStore.length>0?'active':'ready')+'</strong><span>status</span></div></div>';
    for (var c in cats) {
      h += '<div class="result-section"><h4>'+c+' ('+cats[c].count+' items)</h4>';
      h += '<div class="highlight-block">Prompt template: "When reviewing '+c+', check that... [based on '+cats[c].count+' past feedback items]"</div>';
      cats[c].examples.forEach(function(ex) {
        h += '<div style="font-size:0.75rem;color:var(--text-muted);padding:0.2rem 0;border-bottom:1px solid var(--border);font-family:\'JetBrains Mono\',monospace">'+ex.substring(0,80)+(ex.length>80?'...':'')+'</div>';
      });
      h += '</div>';
    }
  }
  document.getElementById("nr-output").innerHTML = h;
}
function loadSampleFeedback() {
  document.getElementById("nr-input").value = "The tone is too casual for this audience. Use more formal language and avoid contractions.";
  document.getElementById("input-stats").textContent = "ready";
}
</script>
</body>
</html>
