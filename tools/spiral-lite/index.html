<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spiral Lite | content automation</title>
<meta name="description" content="Enter a topic and brief. Drafts, scores, and improves content.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
.result-section { margin-bottom: var(--space-md); animation: fadeSlideIn 0.4s ease both; }
.result-section h4 { font-size: 0.7rem; font-family: "Space Grotesk", sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: var(--neon-amber); margin-bottom: 0.5rem; opacity: 0.8; }
.result-section ul { list-style: none; padding: 0; }
.result-section li { padding: 0.3rem 0; font-size: 0.82rem; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.highlight-block { background: var(--ceramic-cool); border-left: 2px solid var(--neon-amber); padding: var(--space-xs) var(--space-sm); margin: var(--space-xs) 0; font-size: 0.8rem; color: var(--text-dim); line-height: 1.7; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xs); margin: var(--space-sm) 0; }
.metric-box { background: var(--ceramic-cool); padding: var(--space-sm); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; }
.metric-box strong { display: block; font-size: 1.5rem; font-weight: 700; font-family: "Space Grotesk", sans-serif; color: var(--neon-cyan); }
.metric-box span { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.2rem; display: block; }
.choice-btn { padding: 0.4rem 0.8rem; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim); cursor: pointer; transition: all 0.2s; font-size: 0.8rem; font-family: "Inter", sans-serif; }
.choice-btn:hover { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.04); }
.choice-btn.active { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.08); }
.chip { display: inline-block; padding: 0.1rem 0.35rem; margin: 0.1rem; background: var(--ceramic-cool); border: 1px solid var(--border); border-radius: 4px; font-size: 0.72rem; color: var(--text-dim); font-family: "JetBrains Mono", monospace; }
.bar-container { background: var(--ceramic-cool); border-radius: 4px; height: 8px; overflow: hidden; margin: 0.25rem 0; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--neon-cyan), rgba(0,229,255,0.4)); transition: width 0.6s ease; }
@media (max-width: 768px) { .tool-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="site-title">
      <span class="title-icon">&#9670;</span>
      mini tools
    </div>
    <nav class="site-nav">
      <a href="../../">apps</a>
      <a href="https://github.com/santaclawone/mini-tools" target="_blank">source</a>
    </nav>
  </div>
</header>

<main class="container tool-page">
  <div class="tool-page-inner">
    <a href="../../" class="tool-back">&larr; back to tools</a>

    <div class="tool-header">
      <div class="tool-header-icon" style="background:linear-gradient(135deg,#00E5FF,#7C3AED);color:#fff;">&#8635;</div>
      <div class="tool-header-text">
        <h1>Spiral Lite</h1>
        <div class="tool-meta">
          <span><span class="meta-dot"></span> batch 1</span>
          <span>interactive</span>
          <span>every.to / Lenny</span>
        </div>
      </div>
    </div>

    <div class="tool-body">
      <div class="tool-panel">
        <h3>topic + brief</h3>
        <textarea id="sl-topic" placeholder="What do you want to write about?" rows="3" style="min-height:60px"></textarea>
        <textarea id="sl-brief" placeholder="Optional brief: target audience, angle, constraints..." rows="4" style="min-height:70px;margin-top:0.5rem"></textarea>
        <div class="tool-actions">
          <button class="btn btn-primary" onclick="draftContent()">draft content</button>
          <button class="sample-btn" onclick="loadSLSample()">sample</button>
        </div>
      </div>

      <div class="tool-panel">
        <h3>drafts</h3>
        <div id="sl-output"><div class="tool-output-empty">Enter a topic and brief, then click "draft content".</div></div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer"><div class="container">Spiral Lite — draft, score, improve content</div></footer>

<script>
function draftContent() {
  var topic = document.getElementById("sl-topic").value.trim(), brief = document.getElementById("sl-brief").value.trim();
  if (!topic) { document.getElementById("sl-output").innerHTML = '<div class="tool-output-empty">Enter a topic to draft content.</div>'; return; }
  var variants = generateVariants(topic, brief);
  var h = '<div class="result-section"><h4>3 drafts scored</h4>';
  variants.forEach(function(v, i) { var score = v.score, pct = score*20;
    h += '<div class="result-section" style="animation-delay:'+(i*0.1)+'s"><h4>variant '+(i+1)+'</h4><div class="highlight-block">'+v.text+'</div><div style="margin-top:0.25rem"><div class="bar-container"><div class="bar-fill" style="width:'+pct+'%"></div></div><div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--text-muted)"><span>'+v.label+'</span><span>'+v.score.toFixed(1)+'/5</span></div></div></div>';
  });
  var best = variants.sort(function(a,b){return b.score-a.score})[0];
  h += '<div class="result-section"><h4>best variant (improved)</h4><div class="highlight-block" style="border-left-color:var(--neon-amber)">'+best.text+'</div><div style="font-size:0.72rem;color:var(--text-muted);margin-top:0.25rem">Score: '+best.score.toFixed(1)+'/5 | Status: ready for review</div></div>';
  document.getElementById("sl-output").innerHTML = h;
}
function generateVariants(topic, brief) {
  var starts = ["Here's what nobody tells you about "+topic+".", "Three things I learned about "+topic+" this year.", "The real problem with "+topic+" isn't what you think.", "I spent months figuring out "+topic+". Here's the shortcut.", topic+": a practical guide for people who build things."];
  var mid = brief ? " "+brief.substring(0,80)+". " : " The key insight is that most approaches miss the fundamental pattern. ";
  var ends = [" This changes how you think about the whole thing.", " Try this approach and see what shifts.", " The results speak for themselves."];
  return [
    {text: starts[0]+mid+ends[0], score: 3.5, label: "hook-driven"},
    {text: starts[2]+mid+ends[1], score: 4.2, label: "contrarian"},
    {text: starts[1]+mid+ends[2], score: 3.8, label: "list-style"}
  ];
}
function loadSLSample() {
  document.getElementById("sl-topic").value = "AI-assisted code review";
  document.getElementById("sl-brief").value = "Focus on practical workflow improvements, not theory. Target: senior engineers skeptical of AI tools.";
}
</script>
</body>
</html>
