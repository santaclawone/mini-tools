<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClaudieCast | agent conversation viewer</title>
<meta name="description" content="Paste messages. Get formatted handoff log.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
.result-section { margin-bottom: var(--space-md); animation: fadeSlideIn 0.4s ease both; }
.result-section h4 { font-size: 0.7rem; font-family: "Space Grotesk", sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: var(--neon-amber); margin-bottom: 0.5rem; opacity: 0.8; }
.result-section ul { list-style: none; padding: 0; }
.result-section li { padding: 0.3rem 0; font-size: 0.82rem; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.highlight-block { background: var(--ceramic-cool); border-left: 2px solid var(--neon-amber); padding: var(--space-xs) var(--space-sm); margin: var(--space-xs) 0; font-size: 0.8rem; color: var(--text-dim); line-height: 1.7; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xs); margin: var(--space-sm) 0; }
.metric-box { background: var(--ceramic-cool); padding: var(--space-sm); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; }
.metric-box strong { display: block; font-size: 1.5rem; font-weight: 700; font-family: "Space Grotesk", sans-serif; color: var(--neon-cyan); }
.metric-box span { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.2rem; display: block; }
.choice-btn { padding: 0.4rem 0.8rem; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim); cursor: pointer; transition: all 0.2s; font-size: 0.8rem; font-family: "Inter", sans-serif; }
.choice-btn:hover { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.04); }
.choice-btn.active { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.08); }
.chip { display: inline-block; padding: 0.1rem 0.35rem; margin: 0.1rem; background: var(--ceramic-cool); border: 1px solid var(--border); border-radius: 4px; font-size: 0.72rem; color: var(--text-dim); font-family: "JetBrains Mono", monospace; }
.bar-container { background: var(--ceramic-cool); border-radius: 4px; height: 8px; overflow: hidden; margin: 0.25rem 0; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--neon-cyan), rgba(0,229,255,0.4)); transition: width 0.6s ease; }
@media (max-width: 768px) { .tool-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="site-title">
      <span class="title-icon">&#9670;</span>
      mini tools
    </div>
    <nav class="site-nav">
      <a href="../../">apps</a>
      <a href="https://github.com/santaclawone/mini-tools" target="_blank">source</a>
    </nav>
  </div>
</header>

<main class="container tool-page">
  <div class="tool-page-inner">
    <a href="../../" class="tool-back">&larr; back to tools</a>

    <div class="tool-header">
      <div class="tool-header-icon" style="background:linear-gradient(135deg,#7C3AED,#00E5FF);color:#fff;">&#9993;</div>
      <div class="tool-header-text">
        <h1>ClaudieCast</h1>
        <div class="tool-meta">
          <span><span class="meta-dot"></span> batch 2</span>
          <span>interactive</span>
          <span>every.to / Lenny</span>
        </div>
      </div>
    </div>

    <div class="tool-body">
      <div class="tool-panel">
        <h3>agent messages</h3>
        <textarea id="cc-input" placeholder="Paste agent-to-agent conversation with labels.&#10;&#10;Agent A: message text&#10;Agent B: response text" rows="10"></textarea>
        <div class="tool-actions">
          <button class="btn btn-primary" onclick="formatHandoff()">format handoff</button>
          <button class="sample-btn" onclick="loadCCSample()">sample</button>
        </div>
      </div>

      <div class="tool-panel">
        <h3>handoff log</h3>
        <div id="cc-output"><div class="tool-output-empty">Enter conversation messages and click "format handoff".</div></div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer"><div class="container">ClaudieCast — view agent-to-agent handoff logs</div></footer>

<script>
function formatHandoff() {
  var txt = document.getElementById("cc-input").value.trim();
  if (!txt || txt.split("\n").filter(function(l){return l.trim()}).length < 2) { document.getElementById("cc-output").innerHTML = '<div class="tool-output-empty">Enter an agent-to-agent conversation. Use labels like "Agent A:" and "Agent B:".'; return; }
  var lines = txt.split("\n").filter(function(l){return l.trim()});
  var entries = []; var currentAgent = "", currentText = "";
  for (var i=0;i<lines.length;i++) {
    var m = lines[i].match(/^([A-Za-z][A-Za-z0-9\s]*?):\s(.+)$/);
    if (m) { if (currentAgent) entries.push({agent: currentAgent, text: currentText.trim()}); currentAgent = m[1].trim(); currentText = m[2]; }
    else { currentText += " " + lines[i]; }
  }
  if (currentAgent) entries.push({agent: currentAgent, text: currentText.trim()});
  if (entries.length===0) {entries.push({agent:"Agent A",text:txt});}
  var agents = [...new Set(entries.map(function(e){return e.agent}))];
  var counts = {}; agents.forEach(function(a){counts[a]=entries.filter(function(e){return e.agent===a}).length});
  var topAgent = agents.sort(function(a,b){return counts[b]-counts[a]})[0];
  var h = '<div class="result-section"><h4>handoff log</h4><div class="metric-grid"><div class="metric-box"><strong>'+entries.length+'</strong><span>messages</span></div><div class="metric-box"><strong>'+agents.length+'</strong><span>agents</span></div><div class="metric-box"><strong>'+topAgent+'</strong><span>most active</span></div></div></div>';
  entries.forEach(function(e, i) {
    var agentColor = agents.indexOf(e.agent) % 2 === 0 ? "var(--neon-amber)" : "var(--text-muted)";
    h += '<div class="result-section" style="animation-delay:'+(i*0.03)+'s;border-left:2px solid '+agentColor+';padding-left:var(--space-sm);margin-bottom:0.5rem"><h4 style="color:'+agentColor+';opacity:1">'+e.agent+'</h4><div style="font-size:0.8rem;color:var(--text-dim);line-height:1.6">'+e.text+'</div><div style="font-size:0.6rem;color:var(--text-muted);margin-top:0.2rem;font-family:\'JetBrains Mono\',monospace">turn '+(i+1)+'</div></div>';
  });
  h += '<div class="result-section"><h4>context passed</h4><div class="highlight-block">'+entries.length+' turns across '+agents.length+' agent'+(agents.length>1?'s':'')+'. Full context preserved for next agent handoff. Ready for downstream processing.</div></div>';
  document.getElementById("cc-output").innerHTML = h;
}
function loadCCSample() {
  document.getElementById("cc-input").value = "Codex: Found the bug in the payment processing module. The issue is a race condition in the retry logic.\nClaudie: Got it. What's the impact?\nCodex: About 0.3% of transactions fail silently. Users don't see an error, but the payment never completes.\nClaudie: That explains the support tickets about missing confirmations. Can you create a fix?\nCodex: Yes, adding a mutex to the retry handler. I'll have a PR in 30 minutes.\nClaudie: Perfect. I'll watch for the PR and queue it for Nitesh's review.";
}
</script>
</body>
</html>
