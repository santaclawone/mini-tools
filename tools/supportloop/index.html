<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SupportLoop | bug report generator</title>
<meta name="description" content="Describe an issue. Get structured agent bug report.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
.result-section { margin-bottom: var(--space-md); animation: fadeSlideIn 0.4s ease both; }
.result-section h4 { font-size: 0.7rem; font-family: "Space Grotesk", sans-serif; text-transform: uppercase; letter-spacing: 0.15em; color: var(--neon-amber); margin-bottom: 0.5rem; opacity: 0.8; }
.result-section ul { list-style: none; padding: 0; }
.result-section li { padding: 0.3rem 0; font-size: 0.82rem; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.highlight-block { background: var(--ceramic-cool); border-left: 2px solid var(--neon-amber); padding: var(--space-xs) var(--space-sm); margin: var(--space-xs) 0; font-size: 0.8rem; color: var(--text-dim); line-height: 1.7; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xs); margin: var(--space-sm) 0; }
.metric-box { background: var(--ceramic-cool); padding: var(--space-sm); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; }
.metric-box strong { display: block; font-size: 1.5rem; font-weight: 700; font-family: "Space Grotesk", sans-serif; color: var(--neon-cyan); }
.metric-box span { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.2rem; display: block; }
.choice-btn { padding: 0.4rem 0.8rem; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim); cursor: pointer; transition: all 0.2s; font-size: 0.8rem; font-family: "Inter", sans-serif; }
.choice-btn:hover { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.04); }
.choice-btn.active { border-color: var(--neon-amber); color: var(--neon-amber); background: rgba(245,158,11,0.08); }
.chip { display: inline-block; padding: 0.1rem 0.35rem; margin: 0.1rem; background: var(--ceramic-cool); border: 1px solid var(--border); border-radius: 4px; font-size: 0.72rem; color: var(--text-dim); font-family: "JetBrains Mono", monospace; }
.bar-container { background: var(--ceramic-cool); border-radius: 4px; height: 8px; overflow: hidden; margin: 0.25rem 0; }
.bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--neon-cyan), rgba(0,229,255,0.4)); transition: width 0.6s ease; }
@media (max-width: 768px) { .tool-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="site-title">
      <span class="title-icon">&#9670;</span>
      mini tools
    </div>
    <nav class="site-nav">
      <a href="../../">apps</a>
      <a href="https://github.com/santaclawone/mini-tools" target="_blank">source</a>
    </nav>
  </div>
</header>

<main class="container tool-page">
  <div class="tool-page-inner">
    <a href="../../" class="tool-back">&larr; back to tools</a>

    <div class="tool-header">
      <div class="tool-header-icon" style="background:linear-gradient(135deg,#FF2D78,#F59E0B);color:#fff;">&#9888;</div>
      <div class="tool-header-text">
        <h1>SupportLoop</h1>
        <div class="tool-meta">
          <span><span class="meta-dot"></span> batch 2</span>
          <span>interactive</span>
          <span>every.to / Lenny</span>
        </div>
      </div>
    </div>

    <div class="tool-body">
      <div class="tool-panel">
        <h3>issue description</h3>
        <textarea id="sl2-desc" placeholder="Describe the bug or issue you encountered.&#10;&#10;Include: what happened, what you expected, and any error messages." rows="8"></textarea>
        <div class="tool-actions">
          <button class="btn btn-primary" onclick="generateBugReport()">generate report</button>
          <button class="sample-btn" onclick="loadSLBug()">sample bug</button>
        </div>
      </div>

      <div class="tool-panel">
        <h3>structured agent bug report</h3>
        <div id="sl2-output"><div class="tool-output-empty">Describe an issue and click "generate report".</div></div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer"><div class="container">SupportLoop — structured bug reports for agent teams</div></footer>

<script>
function generateBugReport() {
  var desc = document.getElementById("sl2-desc").value.trim();
  if (!desc || desc.split(/\s+/).length < 5) { document.getElementById("sl2-output").innerHTML = '<div class="tool-output-empty">Describe the issue in more detail (at least 5 words).</div>'; return; }
  var lc = desc.toLowerCase();
  var sections = ["Reproduction Steps", "Expected Behavior", "Actual Behavior", "Environment", "Impact Analysis", "Suggested Fix"];
  var cat = /error|crash|fail|broken|not working/.test(lc) ? "bug" : /slow|lag|delay|timeout|performance/.test(lc) ? "performance" : /ui|display|layout|alignment|styling|broken|missing/.test(lc) ? "ui" : "general";
  var sev = /crash|data loss|security|payment|billing|critical/.test(lc) ? "critical" : /broken|not working|wrong|incorrect/.test(lc) ? "high" : /slow|minor|cosmetic|typo|small/.test(lc) ? "low" : "medium";
  var steps = [];
  if (lc.match(/login|sign|auth|password/)) {steps.push("1. Navigate to login page");steps.push("2. Enter credentials");steps.push("3. Click submit");}
  else if (lc.match(/payment|checkout|cart|buy|purchase/)) {steps.push("1. Add item to cart");steps.push("2. Proceed to checkout");steps.push("3. Enter payment details");steps.push("4. Submit order");}
  else {steps.push("1. Navigate to the relevant page");steps.push("2. Perform the described action");steps.push("3. Observe the unexpected behavior");}
  var fixMatch = lc.match(/(?:fix|solution|should be|expected|need to) ([^.]+)/i);
  var fixSuggestion = fixMatch ? fixMatch[1].trim() : "Investigate the component and apply standard error handling.";
  var h = '<div class="result-section"><h4>bug report</h4><div class="metric-grid"><div class="metric-box"><strong>'+cat+'</strong><span>category</span></div><div class="metric-box"><strong style="color:'+(sev==="critical"?"#ef4444":"var(--neon-amber)")+'">'+sev+'</strong><span>severity</span></div></div></div>';
  sections.forEach(function(s) {
    h += '<div class="result-section"><h4>'+s.replace(/([A-Z])/g," $1").trim()+'</h4><div class="highlight-block">';
    if (s === "Reproduction Steps") { steps.forEach(function(st){h+=st+"<br>"}); }
    else if (s === "Expected Behavior") { h += 'The system should '+(fixMatch?fixSuggestion:'function correctly without errors.')+' See: '+desc.substring(0,80)+'...'; }
    else if (s === "Actual Behavior") { h += desc.substring(0,200); }
    else if (s === "Environment") { h += 'Browser: Chrome 125 | OS: macOS 14.5 | App version: 2.4.1 (production)'; }
    else if (s === "Impact Analysis") { h += sev==="critical"?'Blocks core workflow for all users.' : sev==="high"?'Affects primary user flow.' : 'Minor impact, cosmetic or edge case.'; }
    else if (s === "Suggested Fix") { h += fixSuggestion; }
    h += '</div></div>';
  });
  h += '<div class="result-section"><h4>agent-ready summary</h4><div class="highlight-block" style="background:var(--ceramic-cool)"><span style="font-family:\'JetBrains Mono\',monospace;font-size:0.78rem">BUG | '+sev+' | '+cat+' | '+desc.substring(0,60)+'... | Steps: '+(steps.length)+' | Suggested: '+fixSuggestion+'</span></div></div>';
  document.getElementById("sl2-output").innerHTML = h;
}
function loadSLBug() {
  document.getElementById("sl2-desc").value = "When I try to complete a payment, the page shows a loading spinner for 10+ seconds and then displays a generic error message. The payment doesn't go through but my card is still charged. This happens with multiple cards and browsers.";
}
</script>
</body>
</html>
