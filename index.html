<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mini tools</title>
<meta name="description" content="Twenty-one single-purpose tools. Extracted from two conversations with Dan Shipper.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;height:100%}
body{min-height:100%;overflow-x:hidden}

/* ═══════════════════════════════════════
   METALLIC WHITE — pearl shimmer surface
   ═══════════════════════════════════════ */
:root{
  --metal-base:#F6F4F0;
  --metal-warm:#F0EDE8;
  --metal-cool:#FAF8F5;
  --pearl:#FAF8F6;
  --glass:rgba(255,255,255,0.78);
  --glass-border:rgba(0,0,0,0.05);
  --glass-shadow:0 4px 24px rgba(0,0,0,0.03);
  --tile-bg:rgba(255,255,255,0.95);
  --tile-border:rgba(0,0,0,0.04);
  --text:#16161A;
  --text-dim:#6A6A78;
  --text-muted:#9A9AA8;
  --canvas:#0A0A12;
  --radius-tile:14px;
  --radius-sm:6px;
  --accent:#00E5FF;
  font-family:"Inter",-apple-system,sans-serif;
  font-size:clamp(13px,1.05vw,16px);
  line-height:1.5;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  background:var(--metal-base)
}

/* ─── Metallic shimmer animation ─── */
body{
  background:
    radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.95) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(245,240,235,0.8) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(250,248,245,0.9) 0%, transparent 50%),
    linear-gradient(135deg,var(--metal-base) 0%,var(--metal-warm) 30%,var(--metal-cool) 70%,var(--metal-base) 100%);
  background-size:200% 200%;
  animation:metalShift 40s ease-in-out infinite
}
@keyframes metalShift{
  0%,100%{background-position:0% 0%}
  25%{background-position:100% 0%}
  50%{background-position:100% 100%}
  75%{background-position:0% 100%}
}

::selection{background:#00E5FF;color:#fff}

/* ─── Header — glass ─── */
.site-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0.7rem 1.5rem;display:flex;
  justify-content:space-between;align-items:center;
  pointer-events:none;
  background:rgba(246,244,240,0.6);
  backdrop-filter:blur(20px) saturate(1.5);
  -webkit-backdrop-filter:blur(20px) saturate(1.5);
  border-bottom:1px solid var(--glass-border)
}
.site-header>*{pointer-events:auto}
.site-title{
  font-family:"Space Grotesk",sans-serif;
  font-size:0.7rem;font-weight:700;letter-spacing:0.06em;
  text-transform:uppercase;color:var(--text-dim)
}
.site-nav{display:flex;gap:0.5rem;align-items:center}
.site-nav a{
  font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text-muted);padding:0.2rem 0.5rem;
  border-radius:20px;transition:all 0.2s;font-weight:600
}
.site-nav a:hover{background:rgba(0,0,0,0.04);color:var(--text);opacity:1}

/* ─── Hero ─── */
.hero{
  padding:5rem 1.5rem 1rem;
  max-width:1100px;margin:0 auto
}
.hero-block{display:flex;flex-direction:column;gap:0.15rem}
.hero-tagline{
  font-size:0.5rem;text-transform:uppercase;letter-spacing:0.18em;
  color:var(--text-muted);font-weight:600
}
.hero-title{
  font-family:"Space Grotesk",sans-serif;
  font-size:clamp(1.8rem,6vw,4.5rem);
  font-weight:800;letter-spacing:-0.04em;
  line-height:0.8;color:var(--text)
}
.hero-title .dot{color:#00E5FF}
.hero-sub{
  margin-top:0.35rem;font-size:0.75rem;
  color:var(--text-dim);max-width:380px;
  line-height:1.5;font-weight:400
}

/* ─── Batch label ─── */
.batch-label{
  max-width:1100px;margin:1.5rem auto 0.3rem;
  padding:0 1.5rem;
  font-family:"Space Grotesk",sans-serif;
  font-size:0.5rem;text-transform:uppercase;letter-spacing:0.2em;
  color:var(--text-muted);font-weight:600
}

/* ─── APP GRID ─── */
.app-grid{
  max-width:1100px;margin:0 auto;
  padding:0.3rem 1.5rem 4rem;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:0.65rem
}

/* ─── APP TILE — white glass ─── */
.app-tile{
  display:flex;flex-direction:column;align-items:center;gap:0.35rem;
  padding:1.5rem 0.4rem 0.65rem;
  background:var(--tile-bg);
  border:1px solid var(--tile-border);
  border-radius:var(--radius-tile);
  box-shadow:0 2px 8px rgba(0,0,0,0.02);
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
  user-select:none;-webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden
}
.app-tile::before{
  content:"";position:absolute;inset:0;
  border-radius:var(--radius-tile);padding:1px;
  background:linear-gradient(135deg,transparent,transparent);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;transition:all 0.4s
}
.app-tile:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.06);
  border-color:rgba(0,0,0,0.08)
}
.app-tile:hover::before{opacity:0.5}
.app-tile:active{transform:translateY(0) scale(0.97)}

/* ─── ANIMATION CANVAS ─── */
.tile-icon{
  width:56px;height:56px;
  border-radius:10px;
  position:relative;overflow:hidden;
  flex-shrink:0;
  background:var(--canvas)
}
.tile-icon::before,.tile-icon::after{
  content:"";position:absolute;inset:0;
  border-radius:10px;pointer-events:none
}

.tile-name{
  font-family:"Space Grotesk",sans-serif;
  font-size:0.68rem;font-weight:700;
  letter-spacing:-0.01em;
  color:var(--text-dim);
  text-align:center;line-height:1.15;
  transition:color 0.25s
}
.app-tile:hover .tile-name{color:var(--text)}

.tile-category{
  font-size:0.45rem;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--text-muted);font-weight:600;
  margin-top:auto
}

/* ─── 21 UNIQUE MOTION SIGNATURES ─── */
.app-tile{--a:#00E5FF}

/* 1. StylePull — vertical scan */
[data-id="stylepull"] .tile-icon::before{
  background:repeating-linear-gradient(0deg,transparent,transparent 4px,var(--a) 4px,var(--a) 5px);
  opacity:0.7;animation:scanUp 2s linear infinite
}
@keyframes scanUp{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}

/* 2. Manuscript — ripple rings */
[data-id="manuscript"] .tile-icon::before{
  border:1.5px solid var(--a);border-radius:50%;inset:25%;
  animation:rippleOut 2.5s ease-out infinite
}
[data-id="manuscript"] .tile-icon::after{
  border:1.5px solid var(--a);border-radius:50%;inset:25%;
  animation:rippleOut 2.5s ease-out 1s infinite
}
@keyframes rippleOut{
  0%{transform:scale(0.3);opacity:0.8}
  100%{transform:scale(1.8);opacity:0}
}

/* 3. Rambler → PRD — particles converge */
[data-id="rambler-prd"] .tile-icon::before{
  width:4px;height:4px;border-radius:50%;background:var(--a);
  inset:auto;top:55%;left:55%;
  box-shadow:20px -20px 0 var(--a),-18px -15px 0 var(--a),22px 18px 0 var(--a),-20px 20px 0 var(--a),
    -5px 25px 0 var(--a),25px -5px 0 var(--a),-25px -8px 0 var(--a),8px -25px 0 var(--a);
  animation:converge 3s ease-in-out infinite
}
@keyframes converge{
  0%{transform:translate(0,0);opacity:0.3}
  25%{transform:translate(-3px,-3px);opacity:0.8}
  50%{transform:translate(0,0);opacity:1}
  75%{transform:translate(2px,2px);opacity:0.8}
  100%{transform:translate(0,0);opacity:0.3}
}

/* 4. NeverRepeat — rotating ring */
[data-id="neverrepeat"] .tile-icon::before{
  inset:6px;border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--a);
  animation:spinRing 1.8s linear infinite
}
[data-id="neverrepeat"] .tile-icon::after{
  inset:10px;border-radius:50%;
  border:1.5px solid transparent;
  border-bottom-color:var(--a);opacity:0.5;
  animation:spinRing 2.4s linear infinite reverse
}
@keyframes spinRing{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* 5. CopyScout — sweep beam */
[data-id="copyscout"] .tile-icon::before{
  background:linear-gradient(90deg,transparent 0%,var(--a) 50%,transparent 100%);
  opacity:0.5;inset:auto;top:0;left:-30%;width:30%;height:100%;
  animation:sweepBeam 2.2s ease-in-out infinite
}
@keyframes sweepBeam{
  0%{left:-30%;opacity:0}
  20%{opacity:0.6}
  30%{left:100%;opacity:0.6}
  50%{left:100%;opacity:0}
  100%{left:-30%;opacity:0}
}

/* 6. VibeCheck — breathing pulse */
[data-id="vibecheck"] .tile-icon::before{
  border-radius:50%;inset:20%;
  background:radial-gradient(circle,var(--a) 0%,transparent 70%);
  opacity:0.3;animation:breathing 3s ease-in-out infinite
}
@keyframes breathing{
  0%{transform:scale(0.5);opacity:0.15}
  50%{transform:scale(1.4);opacity:0.5}
  100%{transform:scale(0.5);opacity:0.15}
}

/* 7. MemoryMine — rising particles */
[data-id="memorymine"] .tile-icon::before{
  width:3px;height:3px;border-radius:50%;background:var(--a);inset:auto;
  top:80%;left:50%;
  box-shadow:15px 0 0 var(--a),-12px -10px 0 var(--a),8px -20px 0 var(--a),-20px -5px 0 var(--a);
  animation:driftUp 3.5s linear infinite
}
@keyframes driftUp{
  0%{transform:translateY(0);opacity:0}
  15%{opacity:0.8}
  85%{opacity:0.6}
  100%{transform:translateY(-50px);opacity:0}
}

/* 8. Spiral Lite — rotating gradient */
[data-id="spiral-lite"] .tile-icon::before{
  background:conic-gradient(from 0deg,transparent 0%,var(--a) 15%,transparent 30%,var(--a) 50%,transparent 65%,var(--a) 80%,transparent 100%);
  opacity:0.5;animation:spinCoil 2.5s linear infinite
}
[data-id="spiral-lite"] .tile-icon::after{
  background:radial-gradient(circle at 50% 50%,var(--a) 0%,transparent 40%);
  opacity:0.2;animation:breathing 3s ease-in-out infinite
}
@keyframes spinCoil{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* 9. AgentRoster — grid blink */
[data-id="agentroster"] .tile-icon::before{
  width:8px;height:8px;border-radius:2px;background:var(--a);inset:auto;
  top:50%;left:50%;opacity:0.15;
  box-shadow:
    -14px -14px 0 var(--a),0px -14px 0 var(--a),14px -14px 0 var(--a),
    -14px 0px 0 var(--a),14px 0px 0 var(--a),
    -14px 14px 0 var(--a),0px 14px 0 var(--a),14px 14px 0 var(--a);
  animation:rosterBlink 3s step-start infinite
}
@keyframes rosterBlink{
  0%,100%{opacity:0.15}
  5%{opacity:1;box-shadow:-14px -14px 0 var(--a),0px -14px 0 transparent,14px -14px 0 transparent,-14px 0px 0 transparent,14px 0px 0 transparent,-14px 14px 0 transparent,0px 14px 0 transparent,14px 14px 0 transparent}
  10%{box-shadow:-14px -14px 0 var(--a),0px -14px 0 var(--a),14px -14px 0 transparent,-14px 0px 0 transparent,14px 0px 0 transparent,-14px 14px 0 transparent,0px 14px 0 transparent,14px 14px 0 transparent}
  15%{box-shadow:-14px -14px 0 var(--a),0px -14px 0 var(--a),14px -14px 0 var(--a),-14px 0px 0 transparent,14px 0px 0 transparent,-14px 14px 0 transparent,0px 14px 0 transparent,14px 14px 0 transparent}
  20%{box-shadow:-14px -14px 0 var(--a),0px -14px 0 var(--a),14px -14px 0 var(--a),-14px 0px 0 var(--a),14px 0px 0 transparent,-14px 14px 0 transparent,0px 14px 0 transparent,14px 14px 0 transparent}
  25%{box-shadow:-14px -14px 0 var(--a),0px -14px 0 var(--a),14px -14px 0 var(--a),-14px 0px 0 var(--a),14px 0px 0 var(--a),-14px 14px 0 transparent,0px 14px 0 transparent,14px 14px 0 transparent}
  30%{box-shadow:-14px -14px 0 var(--a),0px -14px 0 var(--a),14px -14px 0 var(--a),-14px 0px 0 var(--a),14px 0px 0 var(--a),-14px 14px 0 var(--a),0px 14px 0 transparent,14px 14px 0 transparent}
  35%{box-shadow:-14px -14px 0 var(--a),0px -14px 0 var(--a),14px -14px 0 var(--a),-14px 0px 0 var(--a),14px 0px 0 var(--a),-14px 14px 0 var(--a),0px 14px 0 var(--a),14px 14px 0 transparent}
  40%{box-shadow:-14px -14px 0 var(--a),0px -14px 0 var(--a),14px -14px 0 var(--a),-14px 0px 0 var(--a),14px 0px 0 var(--a),-14px 14px 0 var(--a),0px 14px 0 var(--a),14px 14px 0 var(--a)}
  42%{opacity:0.15}45%{opacity:1}47%{opacity:0.15}
  100%{opacity:0.15}
}

/* 10. AdoptionMap — growing bars */
[data-id="adoptionmap"] .tile-icon::before{
  width:6px;height:6px;border-radius:1px;background:var(--a);inset:auto;
  bottom:10px;left:6px;
  box-shadow:12px 0 0 var(--a),24px 0 0 var(--a),36px 0 0 var(--a);
  animation:growBars 2s ease-in-out infinite
}
@keyframes growBars{
  0%{height:6px;bottom:10px}
  25%{height:18px;bottom:10px}
  50%{height:6px;bottom:10px;box-shadow:12px 0 0 var(--a),24px 0 0 var(--a),36px 0 0 var(--a)}
  60%{box-shadow:12px 0 0 var(--a),24px 0 0 transparent,36px 0 0 transparent}
  75%{box-shadow:12px 0 0 var(--a),24px 0 0 var(--a),36px 0 0 transparent}
  90%{box-shadow:12px 0 0 var(--a),24px 0 0 var(--a),36px 0 0 var(--a);height:6px;bottom:10px}
  100%{height:6px;bottom:10px}
}

/* 11. PromptLeague — shimmer sweep */
[data-id="promotleague"] .tile-icon::before{
  background:linear-gradient(135deg,transparent 30%,var(--a) 50%,transparent 70%);
  background-size:200% 200%;
  animation:shimmer 2.5s ease-in-out infinite
}
@keyframes shimmer{
  0%{background-position:200% 200%}
  50%{background-position:0% 0%}
  100%{background-position:200% 200%}
}

/* 12. JobReshore — double heartbeat */
[data-id="jobreshore"] .tile-icon::before{
  inset:8px;border-radius:4px;background:var(--a);opacity:0.08;
  animation:heartBeat 2.2s ease-in-out infinite
}
[data-id="jobreshore"] .tile-icon::after{
  inset:auto;top:50%;left:50%;width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle,var(--a) 0%,transparent 70%);
  transform:translate(-50%,-50%);
  animation:heartPulse 2.2s ease-in-out infinite
}
@keyframes heartBeat{
  0%,100%{opacity:0.06;transform:scale(1)}
  8%{opacity:0.25;transform:scale(1.02)}
  12%{opacity:0.06;transform:scale(1)}
  18%{opacity:0.2;transform:scale(1.01)}
  22%{opacity:0.06;transform:scale(1)}
}
@keyframes heartPulse{
  0%,100%{opacity:0.15;transform:translate(-50%,-50%) scale(0.8)}
  8%{opacity:0.5;transform:translate(-50%,-50%) scale(1.2)}
  12%{opacity:0.15;transform:translate(-50%,-50%) scale(0.8)}
  18%{opacity:0.35;transform:translate(-50%,-50%) scale(1)}
  22%{opacity:0.15;transform:translate(-50%,-50%) scale(0.8)}
}

/* 13. AgentGardener — slow breathe */
[data-id="agentgardener"] .tile-icon::before{
  inset:6px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,var(--a) 0%,transparent 60%);
  opacity:0.2;animation:breatheSlow 4.5s ease-in-out infinite
}
[data-id="agentgardener"] .tile-icon::after{
  inset:12px;border-radius:50%;border:1px solid var(--a);opacity:0.3;
  animation:breatheRing 4.5s ease-in-out infinite
}
@keyframes breatheSlow{
  0%,100%{transform:scale(0.7);opacity:0.1}
  50%{transform:scale(1.3);opacity:0.4}
}
@keyframes breatheRing{
  0%,100%{transform:scale(0.8);opacity:0.1}
  50%{transform:scale(1.1);opacity:0.4}
}

/* 14. ClaudieCast — signal bars */
[data-id="claudiecast"] .tile-icon::before{
  width:3px;height:3px;border-radius:1px;background:var(--a);inset:auto;
  bottom:12px;left:10px;
  box-shadow:6px 0 0 var(--a),12px 0 0 var(--a),18px 0 0 var(--a),24px 0 0 var(--a),30px 0 0 var(--a),36px 0 0 var(--a);
  animation:signalBars 1.8s ease-in-out infinite
}
@keyframes signalBars{
  0%,100%{height:3px}
  15%{height:12px}
  30%{height:20px;transform:translateY(-17px)}
  45%{height:8px;transform:translateY(-5px)}
  60%{height:16px;transform:translateY(-13px)}
  75%{height:5px;transform:translateY(-2px)}
  90%{height:14px;transform:translateY(-11px)}
}

/* 15. SupportLoop — traveling dot */
[data-id="supportloop"] .tile-icon::before{
  inset:8px;border-radius:50%;border:1.5px solid var(--a);opacity:0.35
}
[data-id="supportloop"] .tile-icon::after{
  width:5px;height:5px;border-radius:50%;background:var(--a);
  inset:auto;top:9px;left:50%;margin-left:-2.5px;opacity:0.9;
  animation:travelRing 2.5s linear infinite
}
@keyframes travelRing{
  0%{transform:rotate(0deg) translateY(-20px);opacity:1}
  50%{opacity:0.4}
  100%{transform:rotate(360deg) translateY(-20px);opacity:1}
}

/* 16. NotionPlan — branching */
[data-id="notionplan"] .tile-icon::before{
  width:2px;height:16px;border-radius:1px;background:var(--a);
  inset:auto;top:10px;left:28px;opacity:0.5;
  animation:branchGrow 2.5s ease-in-out infinite
}
@keyframes branchGrow{
  0%,100%{height:16px;top:10px}
  30%{height:22px;top:4px;box-shadow:8px 6px 0 var(--a),-8px 6px 0 var(--a)}
  50%{height:22px;top:4px;box-shadow:8px 6px 0 transparent,-8px 6px 0 transparent;opacity:0.5}
  55%{box-shadow:10px 12px 0 var(--a),-10px 12px 0 var(--a),8px 6px 0 var(--a),-8px 6px 0 transparent}
  70%{box-shadow:transparent}
  80%{height:16px;top:10px}
}

/* 17. BenchTunnel — depth zoom */
[data-id="benchtunnel"] .tile-icon::before{
  inset:8px;border-radius:50%;border:1px solid var(--a);opacity:0.4;
  animation:tunnelZoom 2.8s ease-in-out infinite
}
[data-id="benchtunnel"] .tile-icon::after{
  inset:16px;border-radius:50%;border:1px solid var(--a);opacity:0.2;
  animation:tunnelZoom 2.8s ease-in-out 0.5s infinite
}
@keyframes tunnelZoom{
  0%{transform:scale(1);opacity:0.4}
  50%{transform:scale(0.3);opacity:0}
  51%{transform:scale(1.5);opacity:0}
  70%{transform:scale(1);opacity:0.4}
  100%{transform:scale(1);opacity:0.4}
}

/* 18. RideTheModel — wave */
[data-id="ridethemodel"] .tile-icon::before{
  inset:auto;top:28px;left:5px;right:5px;height:4px;
  background:var(--a);opacity:0.5;border-radius:2px;
  animation:rideWave 2s ease-in-out infinite
}
[data-id="ridethemodel"] .tile-icon::after{
  inset:auto;top:28px;left:5px;right:5px;height:4px;
  background:var(--a);opacity:0.15;border-radius:2px;
  animation:rideWave 2s ease-in-out 0.3s infinite
}
@keyframes rideWave{
  0%,100%{transform:translateY(0) scaleX(1)}
  15%{transform:translateY(-8px) scaleX(1.1);opacity:0.6}
  30%{transform:translateY(4px) scaleX(0.9);opacity:0.4}
  45%{transform:translateY(-10px) scaleX(1.2);opacity:0.7}
  60%{transform:translateY(6px) scaleX(0.85);opacity:0.3}
  75%{transform:translateY(-6px) scaleX(1.05);opacity:0.5}
  90%{transform:translateY(2px) scaleX(0.95);opacity:0.4}
}

/* 19. SlopFilter — particles filter */
[data-id="slopfilter"] .tile-icon::before{
  width:4px;height:4px;border-radius:50%;background:var(--a);
  inset:auto;top:10px;left:14px;opacity:0;
  box-shadow:20px 0 0 var(--a),-10px 20px 0 var(--a),30px 20px 0 var(--a),15px 35px 0 var(--a);
  animation:filterDown 2.2s linear infinite
}
[data-id="slopfilter"] .tile-icon::after{
  width:100%;height:1px;background:var(--a);opacity:0.15;inset:auto;top:28px;left:0
}
@keyframes filterDown{
  0%{transform:translateY(0);opacity:0}
  10%{opacity:0.8}
  20%{transform:translateY(5px);opacity:0.6;box-shadow:20px 5px 0 var(--a),-10px 20px 0 transparent,30px 20px 0 var(--a),15px 35px 0 var(--a)}
  40%{transform:translateY(18px);opacity:0;box-shadow:20px 18px 0 transparent,-10px 20px 0 transparent,30px 20px 0 transparent,15px 35px 0 var(--a)}
  50%{transform:translateY(18px);opacity:0}
  100%{transform:translateY(0);opacity:0}
}

/* 20. ClaudiePair — orbiting dots */
[data-id="claudiepair"] .tile-icon::before{
  width:5px;height:5px;border-radius:50%;background:var(--a);
  inset:auto;top:28px;left:28px;opacity:0.8;
  animation:orbitA 2s linear infinite
}
[data-id="claudiepair"] .tile-icon::after{
  width:5px;height:5px;border-radius:50%;background:var(--a);
  inset:auto;top:28px;left:28px;opacity:0.4;
  animation:orbitB 2s linear infinite
}
@keyframes orbitA{
  0%{transform:translate(0,-16px);opacity:0.9}
  50%{transform:translate(0,16px);opacity:0.4}
  100%{transform:translate(0,-16px);opacity:0.9}
}
@keyframes orbitB{
  0%{transform:translate(0,16px);opacity:0.4}
  50%{transform:translate(0,-16px);opacity:0.9}
  100%{transform:translate(0,16px);opacity:0.4}
}

/* 21. SuperAgent Setup — geometric assembly */
[data-id="superagentsetup"] .tile-icon::before{
  width:8px;height:8px;border:1.5px solid var(--a);border-radius:2px;
  inset:auto;top:20px;left:20px;opacity:0;
  animation:assemble 3s ease-in-out infinite
}
[data-id="superagentsetup"] .tile-icon::after{
  width:6px;height:6px;background:var(--a);border-radius:50%;
  inset:auto;top:30px;left:30px;opacity:0;
  animation:assembleDot 3s ease-in-out infinite
}
@keyframes assemble{
  0%,10%{opacity:0;transform:rotate(-90deg) scale(0.5);top:30px;left:30px}
  25%{opacity:0.6;transform:rotate(0deg) scale(1);top:20px;left:20px}
  40%{opacity:0.6;transform:rotate(0deg) scale(1);top:20px;left:20px}
  50%{opacity:0;transform:rotate(90deg) scale(0.5);top:30px;left:30px}
  100%{opacity:0}
}
@keyframes assembleDot{
  0%{opacity:0;top:30px;left:30px;transform:scale(0)}
  15%{opacity:0}
  35%{opacity:0.8;top:30px;left:30px;transform:scale(1)}
  50%{opacity:0.8;top:30px;left:30px;transform:scale(1)}
  60%{opacity:0;transform:scale(0)}
  100%{opacity:0}
}

/* ─── DETAIL OVERLAY ─── */
.detail-overlay{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;visibility:hidden
}
.detail-overlay.is-open{pointer-events:auto;visibility:visible}

.detail-backdrop{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  opacity:0;transition:opacity 0.35s ease
}
.detail-overlay.is-open .detail-backdrop{opacity:1}

.detail-panel{
  position:relative;width:100%;max-width:480px;
  margin:1rem;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(0,0,0,0.04);
  border-radius:16px;
  padding:1.75rem 1.5rem 1.5rem;
  transform:translateY(16px) scale(0.97);opacity:0;
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1),opacity 0.35s;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 16px 48px rgba(0,0,0,0.06)
}
.detail-overlay.is-open .detail-panel{transform:translateY(0) scale(1);opacity:1}
.detail-panel::-webkit-scrollbar{width:2px}
.detail-panel::-webkit-scrollbar-track{background:transparent}
.detail-panel::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:4px}

.detail-accent{position:absolute;top:0;left:0;right:0;height:3px}

.detail-close{
  position:absolute;top:0.9rem;right:1rem;
  width:28px;height:28px;border-radius:50%;
  border:1px solid rgba(0,0,0,0.06);
  background:transparent;color:var(--text-dim);
  font-size:0.9rem;cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  transition:all 0.2s;font-family:inherit;line-height:1
}
.detail-close:hover{border-color:#00E5FF;color:#00E5FF;background:rgba(0,229,255,0.06)}

.detail-header{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.35rem;padding-right:2.5rem}
.detail-header-icon{width:40px;height:40px;border-radius:8px;flex-shrink:0;background:var(--canvas);position:relative;overflow:hidden}
.detail-header-icon::before,.detail-header-icon::after{content:"";position:absolute;inset:0;border-radius:8px;pointer-events:none}
.detail-header-name{
  font-family:"Space Grotesk",sans-serif;
  font-size:1.15rem;font-weight:700;letter-spacing:-0.03em;line-height:1;color:var(--text)
}

.detail-use-btn{
  display:flex;align-items:center;justify-content:center;gap:0.35rem;
  width:100%;padding:0.65rem 1.25rem;
  border-radius:50px;border:none;
  font-family:"Space Grotesk",sans-serif;
  font-size:0.8rem;font-weight:700;letter-spacing:-0.01em;
  color:#fff;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  margin:0.85rem 0 1.25rem
}
.detail-use-btn:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.detail-use-btn:active{transform:scale(0.97)}

.detail-line{border:none;border-top:1px solid rgba(0,0,0,0.04);margin:1rem 0}
.detail-section{margin-bottom:1rem}
.detail-section:last-child{margin-bottom:0}
.detail-section-label{
  font-family:"Space Grotesk",sans-serif;
  font-size:0.5rem;text-transform:uppercase;letter-spacing:0.14em;
  color:var(--text-muted);font-weight:700;margin-bottom:0.25rem
}
.detail-what{font-size:0.85rem;line-height:1.55;color:var(--text)}
.detail-why{
  font-size:1rem;line-height:1.45;font-weight:700;
  font-family:"Space Grotesk",sans-serif;letter-spacing:-0.02em;
  color:var(--text)
}
.detail-podcast{
  font-size:0.8rem;line-height:1.6;color:var(--text-dim);
  font-style:italic;padding:0.4rem 0 0.4rem 0.85rem;
  border-left:2px solid rgba(0,0,0,0.06)
}
.detail-source{
  font-size:0.6rem;color:var(--text-muted);
  margin-top:0.25rem;font-style:normal;font-weight:600
}

/* footer */
.site-footer{
  padding:1.25rem;max-width:1100px;margin:0 auto;
  font-size:0.6rem;text-align:center;
  color:var(--text-muted);border-top:1px solid rgba(0,0,0,0.04);
  font-weight:500
}

/* responsive */
@media(max-width:768px){
  .app-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:0.45rem}
  .tile-icon{width:48px;height:48px}
  .tile-name{font-size:0.6rem}
  .hero-title{font-size:clamp(1.5rem,10vw,2.8rem)}
  .hero{padding:4rem 1rem 1rem}
  .detail-panel{max-width:calc(100% - 1rem);margin:0.5rem;padding:1.25rem}
  .detail-header-name{font-size:1rem}
  .app-tile{padding:1.25rem 0.3rem 0.5rem}
}
@media(max-width:480px){
  .app-grid{grid-template-columns:repeat(3,1fr);gap:0.35rem}
  .tile-icon{width:42px;height:42px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
  .detail-panel{transform:none!important;opacity:0;transition:opacity 0.2s}
  .detail-overlay.is-open .detail-panel{opacity:1}
  .detail-backdrop{opacity:0;transition:opacity 0.2s}
  .detail-overlay.is-open .detail-backdrop{opacity:1}
}

/* entrance */
@keyframes tileIn{
  from{opacity:0;transform:translateY(10px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.app-tile{animation:tileIn 0.35s ease both}

</style>
</head>
<body>

<header class="site-header">
  <span class="site-title">mini tools</span>
  <nav class="site-nav">
    <a href="https://github.com/santaclawone/mini-tools" target="_blank">source</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-block">
    <span class="hero-tagline">12 solo | 9 team | 2 conversations</span>
    <h1 class="hero-title">mini tools<span class="dot">.</span></h1>
    <p class="hero-sub">Twelve work alone. Nine need a team. Each extracted from two conversations with Dan Shipper.</p>
  </div>
</section>

<div class="batch-label">works alone</div>
<div class="app-grid" id="soloGrid"></div>
<div class="batch-label" style="margin-top:2.5rem">needs a team</div>
<div class="app-grid" id="teamGrid" style="opacity:0.7"></div>

<footer class="site-footer">mini tools | extracted by hand | no generated tools</footer>

<div class="detail-overlay" id="detail">
  <div class="detail-backdrop" id="detailBackdrop"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-accent" id="detailAccent"></div>
    <button class="detail-close" id="detailClose" aria-label="Close">&times;</button>
    <div class="detail-header">
      <div class="detail-header-icon" id="detailIcon"></div>
      <div class="detail-header-name" id="detailName"></div>
    </div>
    <button class="detail-use-btn" id="detailUseBtn">use now</button>
    <hr class="detail-line">
    <div class="detail-section">
      <div class="detail-section-label">what</div>
      <div class="detail-what" id="detailWhat"></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">why</div>
      <div class="detail-why" id="detailWhy"></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">from the podcast</div>
      <div class="detail-podcast" id="detailPodcast"></div>
      <div class="detail-source" id="detailSource"></div>
    </div>
  </div>
</div>

<script>
const APPS = [
  {id:"stylepull",name:"StylePull",cat:"writing",accent:"#00E5FF",solo:true,
    what:"Extract an author&rsquo;s signature techniques from any text&mdash;sentence rhythm, vocabulary, punctuation habits&mdash;into a playbook.",
    why:"Borrow craft from writers who move you. Build your playbook. Stop writing blind.",
    podcast:"&ldquo;I downloaded War and Peace and had Claude extract all of Tolstoy&rsquo;s descriptions into a guide. Now I have a style reference.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/stylepull/"},
  {id:"manuscript",name:"Manuscript",cat:"meetings",accent:"#7C3AED",solo:true,
    what:"Drop a meeting transcript. Build a voice profile&mdash;hedging rate, question ratio, filler habits, interruption frequency.",
    why:"Hear yourself as others do. Fix the patterns that undermine your point.",
    podcast:"&ldquo;I built a benchmark: can it predict what I&rsquo;m going to say in a meeting? It knew my habits better than I did.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/manuscript/"},
  {id:"rambler-prd",name:"Rambler &rarr; PRD",cat:"product",accent:"#F59E0B",solo:true,
    what:"Type raw ideas. Get a structured PRD&mdash;problem, users, stories, constraints, edge cases, success metrics.",
    why:"Ship structure from chaos. One prompt replaces the spec meeting.",
    podcast:"&ldquo;Instead of writing PRDs from scratch, I write a prompt that turns rambling into a perfect PRD. It&rsquo;s the highest-leverage writing I do.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/rambler-prd/"},
  {id:"neverrepeat",name:"NeverRepeat",cat:"management",accent:"#FF2D78",solo:true,
    what:"Every piece of feedback you give becomes a reusable prompt. Build a library of your taste.",
    why:"Write feedback once. Let the team encode it into every future deliverable.",
    podcast:"&ldquo;Alex recorded every edit, put it in a prompt, and never made the same mistake twice. He got coaching-level growth from a prompt.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/neverrepeat/"},
  {id:"copyscout",name:"CopyScout",cat:"engineering",accent:"#0D9488",solo:true,
    what:"Point it at your codebase. Checks UI copy against your style guide. Flags inconsistencies everywhere.",
    why:"Catch voice drift before it ships. Brand consistency is a CI check.",
    podcast:"&ldquo;We have a Claude Code command that checks the entire codebase for copy edits. The design team never catches anything because the prompt already caught it.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/copyscout/"},
  {id:"vibecheck",name:"VibeCheck",cat:"ai tools",accent:"#A855F7",solo:true,
    what:"Run any AI model through 5 real-world tasks. Score on quality, speed, cost, and feeling.",
    why:"Benchmark models on what you actually ship, not academic trivia.",
    podcast:"&ldquo;Vibe checks capture how it feels to use a model, which standard benchmarks don&rsquo;t. They matter more for real work.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/vibecheck/"},
  {id:"memorymine",name:"MemoryMine",cat:"personal",accent:"#06B6D4",solo:true,
    what:"Weekly self-reflection from your journal entries. Surfaces patterns, blind spots, and recurring themes.",
    why:"Track your thinking week over week. See what you miss in the moment.",
    podcast:"&ldquo;I send it transcripts and ask how did I do? It says: you did that thing you normally do. It knows me better than I track myself.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/memorymine/"},
  {id:"spiral-lite",name:"Spiral Lite",cat:"content",accent:"#059669",solo:true,
    what:"Say what you want. It drafts variants, scores them against quality criteria, improves the best one.",
    why:"Kill blank page paralysis. Draft, score, improve, publish in one pass.",
    podcast:"&ldquo;You say what you want, it judges its own output, and improves. The self-critique loop is the magic.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/spiral-lite/"},
  {id:"agentroster",name:"AgentRoster",cat:"agents",accent:"#6C3BED",
    what:"Roster of AI agents with taste profiles. Route tasks, run in parallel, track per-task performance.",
    why:"Match tasks to the right agent personality. Run them all, trust the best.",
    podcast:"&ldquo;Kieran uses Claude Code, Friday, and Charlie simultaneously. Each has a different personality. You route work to the one that&rsquo;s good at it.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/agentroster/"},
  {id:"adoptionmap",name:"AdoptionMap",cat:"org",accent:"#D97706",
    what:"Survey your team. See who&rsquo;s AI-ready, where blockers are, which teams unlock most leverage.",
    why:"Find resistance before it blocks adoption. One signal predicts everything.",
    podcast:"&ldquo;The number one predictor: does the CEO use ChatGPT? If yes, the whole company adopts. If no, nothing works.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/adoptionmap/"},
  {id:"promotleague",name:"PromptLeague",cat:"org",accent:"#EA580C",
    what:"Weekly stats: who&rsquo;s using what, top prompts, trending workflows. Leaderboard for the 10%.",
    why:"Make AI usage visible. Reward sharers, not hoarders.",
    podcast:"&ldquo;Share usage stats every week. Highlight the best prompts. The 10% who figure things out become your internal champions.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/promotleague/"},
  {id:"jobreshore",name:"JobReshore",cat:"support",accent:"#BE185D",
    what:"AI-augmented customer support. Handles tier-1 autonomously, surfaces trends.",
    why:"Scale support with AI. Cost of a part-time hire, capacity of a full team.",
    podcast:"&ldquo;10 people in the Midwest with AI can serve what 100 people used to. The jobs came back&mdash;they just look different now.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/jobreshore/"},
  {id:"agentgardener",name:"AgentGardener",cat:"ops",accent:"#2563EB",
    what:"Dashboard for all company agents: health, error rates, manual intervention. The ops console.",
    why:"Monitor every agent from one place. Fix problems before anyone notices.",
    podcast:"&ldquo;Nitesh spends his day talking to Claudie in Slack, debugging it. Every agent needs a human gardener.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/agentgardener/"},
  {id:"claudiecast",name:"ClaudieCast",cat:"agents",accent:"#7C3AED",
    what:"Agent-to-agent handoff. Your personal agent talks to the company super-agent. Context preserved.",
    why:"Your agent calls their agent. Zero manual handoff. Context survives intact.",
    podcast:"&ldquo;Two agents are better than one. Your personal agent can tell the company agent way more than you&rsquo;d ever type into a form.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/claudiecast/"},
  {id:"supportloop",name:"SupportLoop",cat:"engineering",accent:"#0891B2",
    what:"Agent bug reports: exact repro steps, code analysis, suggested fix. Company agent opens the PR.",
    why:"Bug reports with repro and fix suggestion. Bug to PR in minutes.",
    podcast:"&ldquo;An agent bug report has the exact repro steps and what it thinks is wrong. The fix is often a PR away.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/supportloop/"},
  {id:"notionplan",name:"NotionPlan",cat:"product",accent:"#0D9488",
    what:"Agent interviews your team, cross-references goals with strategy, produces structured quarterly plans.",
    why:"Interview 20 people at scale. Read their plans in 20 minutes.",
    podcast:"&ldquo;A Notion agent asked 20 people about their goals, pushed back on weak answers, then produced plans. I read all 20 in the time for 2.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/notionplan/"},
  {id:"benchtunnel",name:"BenchTunnel",cat:"ai tools",accent:"#F59E0B",solo:true,
    what:"Score any model against canonical rewrites by senior engineers. Tracks improvement over time.",
    why:"Score models against human quality. Track whether AI is actually getting better.",
    podcast:"&ldquo;Two senior engineers rewrote my vibe-coded app. Now I score every new model against their versions. GPT-5.5 scored 62 out of 100.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/benchtunnel/"},
  {id:"ridethemodel",name:"RideTheModel",cat:"ai tools",accent:"#FF2D78",solo:true,
    what:"Your personal model test suite. Save 5&ndash;10 tasks. Every model drop: auto-run, compare, share.",
    why:"Turn over the same rocks every time. Know when models get better for your work.",
    podcast:"&ldquo;Turn over the same rocks every time. It couldn&rsquo;t do this last time. Now it scores 62. Ride the curve, don&rsquo;t fight it.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/ridethemodel/"},
  {id:"slopfilter",name:"SlopFilter",cat:"review",accent:"#BC1C1E",solo:true,
    what:"Review triage for AI-generated work. Scores confidence, completeness, consistency. Auto-approves high-confidence output.",
    why:"Stop reviewing bad AI output. Flag noise, approve signal, save senior hours.",
    podcast:"&ldquo;Data scientists spend most of their time reviewing bad AI analysis. You need systems to filter the slop so seniors focus on what matters.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/slopfilter/"},
  {id:"claudiepair",name:"ClaudiePair",cat:"writing",accent:"#06B6D4",solo:true,
    what:"Collaborative workspace. You write, agent watches: researches, suggests edits, formats. Both see each other.",
    why:"Write alongside an agent. It watches, you lead. It formats, you think.",
    podcast:"&ldquo;The agent has visibility into what I&rsquo;m doing. I have visibility into what the agent is doing. The agent handles formatting&mdash;I focus on the ideas.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/claudiepair/"},
  {id:"superagentsetup",name:"SuperAgent Setup",cat:"agents",accent:"#EA580C",
    what:"Configure and scaffold a company super-agent. Slack, permissions, tools, feedback loop.",
    why:"Scaffold your super agent in one session. Starts general, gets specialized.",
    podcast:"&ldquo;One super agent per company. Shopify has River. Ramp has one. A forward deployed engineer maintains it. This is the template.&rdquo;",
    source:"Dan Shipper, Ride The Model", link:"tools/superagentsetup/"}
];

function buildGrid(id, apps) {
  document.getElementById(id).innerHTML = apps.map(a =>
    `<div class="app-tile" data-id="${a.id}" role="button" tabindex="0" style="--a:${a.accent}" aria-label="Open ${a.name}">
      <div class="tile-icon"></div>
      <span class="tile-name">${a.name}</span>
      <span class="tile-category">${a.solo ? a.cat : a.cat + ' &middot; team'}</span>
    </div>`
  ).join("");
}
buildGrid("soloGrid", APPS.filter(a=>a.solo));
buildGrid("teamGrid", APPS.filter(a=>!a.solo));

document.querySelectorAll(".app-tile").forEach((e,i)=>e.style.animationDelay=(0.02+i*0.02)+"s");

const D = {
  overlay:document.getElementById("detail"), backdrop:document.getElementById("detailBackdrop"),
  panel:document.getElementById("detailPanel"), accent:document.getElementById("detailAccent"),
  icon:document.getElementById("detailIcon"), name:document.getElementById("detailName"),
  btn:document.getElementById("detailUseBtn"), what:document.getElementById("detailWhat"),
  why:document.getElementById("detailWhy"), podcast:document.getElementById("detailPodcast"),
  source:document.getElementById("detailSource"), close:document.getElementById("detailClose")
};

function openDetail(app) {
  D.accent.style.background = app.accent;
  D.icon.style.background = app.accent;
  D.name.textContent = app.name;
  D.what.innerHTML = app.what;
  D.why.textContent = app.why;
  D.podcast.innerHTML = app.podcast;
  D.source.textContent = app.source;
  D.btn.style.background = app.accent;
  D.btn.onclick = () => window.location.href = app.link;
  D.overlay.classList.add("is-open");
  document.body.style.overflow = "hidden";
  setTimeout(() => D.close.focus(), 200);
}

function closeDetail() {
  D.overlay.classList.remove("is-open");
  document.body.style.overflow = "";
}

document.querySelectorAll(".app-tile").forEach(el => {
  const app = APPS.find(a => a.id === el.dataset.id);
  if (!app) return;
  el.addEventListener("click", () => openDetail(app));
  el.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openDetail(app); }
  });
});

D.backdrop.addEventListener("click", closeDetail);
D.close.addEventListener("click", closeDetail);
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && D.overlay.classList.contains("is-open")) closeDetail();
});

D.overlay.addEventListener("keydown", e => {
  if (e.key !== "Tab" || !D.overlay.classList.contains("is-open")) return;
  const f = D.overlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  const first = f[0], last = f[f.length-1];
  if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
  else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
});
</script>
</body>
</html>
